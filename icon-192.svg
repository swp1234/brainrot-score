<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D2D3"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#48cae4"/>
    </linearGradient>
    <linearGradient id="melt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00D2D3"/>
      <stop offset="100%" stop-color="#00D2D3" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <g transform="translate(96,88)" filter="url(#glow)">
    <!-- Brain shape -->
    <path d="M-8,-32 C-8,-40 -20,-44 -28,-40 C-36,-36 -38,-26 -36,-20 C-42,-18 -44,-10 -42,-4 C-46,2 -44,12 -38,16 C-40,22 -36,30 -28,32 C-20,34 -12,30 -8,24" fill="url(#brain)" opacity="0.9"/>
    <path d="M8,-32 C8,-40 20,-44 28,-40 C36,-36 38,-26 36,-20 C42,-18 44,-10 42,-4 C46,2 44,12 38,16 C40,22 36,30 28,32 C20,34 12,30 8,24" fill="url(#brain)" opacity="0.9"/>
    <line x1="0" y1="-32" x2="0" y2="24" stroke="#0a0a0f" stroke-width="2.5"/>
    <!-- Brain folds -->
    <path d="M-28,-20 Q-18,-16 -8,-20" fill="none" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
    <path d="M-36,-4 Q-22,2 -8,0" fill="none" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
    <path d="M28,-20 Q18,-16 8,-20" fill="none" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
    <path d="M36,-4 Q22,2 8,0" fill="none" stroke="#0a0a0f" stroke-width="1.5" opacity="0.6"/>
    <!-- Melt drips -->
    <path d="M-20,30 Q-20,48 -18,56" stroke="url(#melt)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0,24 Q0,46 2,58" stroke="url(#melt)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M20,30 Q20,50 22,54" stroke="url(#melt)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Glitch bars -->
    <rect x="-30" y="-8" width="60" height="3" fill="#ff006e" opacity="0.3"/>
    <rect x="-25" y="8" width="50" height="2" fill="#00D2D3" opacity="0.4"/>
  </g>
  <!-- Emoji eyes (spirals = brainrot) -->
  <circle cx="78" cy="78" r="6" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.7"/>
  <circle cx="78" cy="78" r="3" fill="#ff006e" opacity="0.5"/>
  <circle cx="114" cy="78" r="6" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.7"/>
  <circle cx="114" cy="78" r="3" fill="#ff006e" opacity="0.5"/>
</svg>
