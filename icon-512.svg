<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D2D3"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#48cae4"/>
    </linearGradient>
    <linearGradient id="melt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00D2D3"/>
      <stop offset="100%" stop-color="#00D2D3" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g transform="translate(256,230)" filter="url(#glow)">
    <!-- Brain shape - larger -->
    <path d="M-20,-85 C-20,-106 -53,-117 -75,-106 C-96,-96 -101,-69 -96,-53 C-112,-48 -117,-27 -112,-11 C-122,5 -117,32 -101,43 C-106,59 -96,80 -75,85 C-53,91 -32,80 -20,64" fill="url(#brain)" opacity="0.9"/>
    <path d="M20,-85 C20,-106 53,-117 75,-106 C96,-96 101,-69 96,-53 C112,-48 117,-27 112,-11 C122,5 117,32 101,43 C106,59 96,80 75,85 C53,91 32,80 20,64" fill="url(#brain)" opacity="0.9"/>
    <line x1="0" y1="-85" x2="0" y2="64" stroke="#0a0a0f" stroke-width="6"/>
    <!-- Brain folds -->
    <path d="M-75,-53 Q-48,-43 -20,-53" fill="none" stroke="#0a0a0f" stroke-width="3.5" opacity="0.6"/>
    <path d="M-96,-11 Q-59,5 -20,0" fill="none" stroke="#0a0a0f" stroke-width="3.5" opacity="0.6"/>
    <path d="M-85,30 Q-52,40 -20,32" fill="none" stroke="#0a0a0f" stroke-width="3" opacity="0.5"/>
    <path d="M75,-53 Q48,-43 20,-53" fill="none" stroke="#0a0a0f" stroke-width="3.5" opacity="0.6"/>
    <path d="M96,-11 Q59,5 20,0" fill="none" stroke="#0a0a0f" stroke-width="3.5" opacity="0.6"/>
    <path d="M85,30 Q52,40 20,32" fill="none" stroke="#0a0a0f" stroke-width="3" opacity="0.5"/>
    <!-- Melt drips -->
    <path d="M-55,80 Q-55,128 -50,150" stroke="url(#melt)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M0,64 Q0,122 5,155" stroke="url(#melt)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M55,80 Q55,132 58,145" stroke="url(#melt)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M-30,75 Q-30,110 -28,125" stroke="url(#melt)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M30,75 Q30,115 32,130" stroke="url(#melt)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Glitch bars -->
    <rect x="-80" y="-22" width="160" height="7" fill="#ff006e" opacity="0.3"/>
    <rect x="-65" y="20" width="130" height="5" fill="#00D2D3" opacity="0.4"/>
    <rect x="-70" y="-55" width="140" height="4" fill="#ff006e" opacity="0.2"/>
  </g>
  <!-- Spiral eyes -->
  <g opacity="0.7">
    <circle cx="208" cy="200" r="16" fill="none" stroke="#ff006e" stroke-width="4"/>
    <circle cx="208" cy="200" r="8" fill="none" stroke="#ff006e" stroke-width="3"/>
    <circle cx="208" cy="200" r="3" fill="#ff006e"/>
    <circle cx="304" cy="200" r="16" fill="none" stroke="#ff006e" stroke-width="4"/>
    <circle cx="304" cy="200" r="8" fill="none" stroke="#ff006e" stroke-width="3"/>
    <circle cx="304" cy="200" r="3" fill="#ff006e"/>
  </g>
</svg>
